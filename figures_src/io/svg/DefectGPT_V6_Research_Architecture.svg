<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <!-- Define Professional Icons as Markers -->
  <defs>
    <!-- Brain Icon -->
    <g id="icon-brain">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-5-9h10v2H7z" fill="currentColor"/>
    </g>
    <!-- Drone Icon -->
    <g id="icon-drone">
      <path d="M21 16.5C21 16.88 20.88 17.21 20.67 17.5L22 19V20H2V19L3.33 17.5C3.12 17.21 3 16.88 3 16.5V11C3 7.69 5.69 5 9 5H15C18.31 5 21 7.69 21 11V16.5M19 11C19 8.79 17.21 7 15 7H9C6.79 7 5 8.79 5 11V16H19V11Z" fill="currentColor"/>
    </g>
    <!-- Arrowheads -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#495057" />
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e03131" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff"/>
  
  <!-- Main Stages Containers -->
  <!-- Stage I: Multi-modal Perception -->
  <rect x="50" y="100" width="220" height="700" rx="15" fill="#f8f9fa" stroke="#ced4da" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="160" y="80" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#495057">I: PERCEPTION</text>
  
  <!-- Stage II: Hierarchical Knowledge Structuring -->
  <rect x="320" y="100" width="240" height="700" rx="15" fill="#e7f5ff" stroke="#339af0" stroke-width="2"/>
  <text x="440" y="80" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#1971c2">II: STRUCTURING</text>

  <!-- Stage III: Cognitive Agent Reasoning -->
  <rect x="610" y="100" width="300" height="700" rx="15" fill="#fff9db" stroke="#fab005" stroke-width="2"/>
  <text x="760" y="80" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#f59f00">III: COGNITION</text>

  <!-- Stage IV: Operational Execution -->
  <rect x="960" y="100" width="200" height="700" rx="15" fill="#e8f5e9" stroke="#40c057" stroke-width="2"/>
  <text x="1060" y="80" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#2f9e44">IV: EXECUTION</text>

  <!-- Stage I Elements -->
  <g transform="translate(80, 140)">
    <rect width="160" height="90" rx="8" fill="white" stroke="#adb5bd"/>
    <text x="80" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold">RGB Vision</text>
    <text x="80" y="55" text-anchor="middle" font-size="11" fill="#868e96">8,797 Items</text>
    <path d="M60 70 L100 70" stroke="#ff6b6b" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  </g>
  <g transform="translate(80, 250)">
    <rect width="160" height="90" rx="8" fill="white" stroke="#adb5bd"/>
    <text x="80" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Thermal IR</text>
    <text x="80" y="55" text-anchor="middle" font-size="11" fill="#868e96">965 Items</text>
    <path d="M60 70 L100 70" stroke="#fcc419" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  </g>
  <g transform="translate(80, 360)">
    <rect width="160" height="90" rx="8" fill="white" stroke="#adb5bd"/>
    <text x="80" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold">BIM (IFC)</text>
    <text x="80" y="55" text-anchor="middle" font-size="11" fill="#868e96">Structural Roles</text>
    <path d="M65 70 L95 70" stroke="#339af0" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Stage II Elements -->
  <g transform="translate(340, 220)">
    <rect width="200" height="250" rx="10" fill="white" stroke="#339af0" stroke-width="2"/>
    <text x="100" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold">HIDP Tree (V6.2)</text>
    <circle cx="100" cy="70" r="6" fill="#1971c2"/>
    <line x1="100" y1="70" x2="60" y2="120" stroke="#339af0" stroke-width="1.5"/>
    <line x1="100" y1="70" x2="140" y2="120" stroke="#339af0" stroke-width="1.5"/>
    <rect x="45" y="120" width="30" height="20" rx="3" fill="#e7f5ff" stroke="#339af0"/>
    <rect x="125" y="120" width="30" height="20" rx="3" fill="#e7f5ff" stroke="#339af0"/>
    <text x="100" y="180" text-anchor="middle" font-size="11" font-style="italic">614 Semantic Nodes</text>
    <text x="100" y="210" text-anchor="middle" font-size="10" fill="#1864ab">Spatial-Semantic Fusion</text>
  </g>

  <!-- Stage III Elements (Cognitive Brain) -->
  <g transform="translate(630, 150)">
    <rect width="260" height="500" rx="15" fill="white" stroke="#fab005" stroke-width="3"/>
    <text x="130" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f59f00">Cognitive Agent Engine</text>
    
    <!-- ToT Parallel Processing -->
    <rect x="20" y="60" width="220" height="120" rx="8" fill="#fffdeb" stroke="#f59f00" stroke-dasharray="4"/>
    <text x="110" y="85" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Tree of Thought (ToT)</text>
    <rect x="40" y="100" width="50" height="50" rx="5" fill="white" stroke="#f59f00" opacity="0.8"/>
    <rect x="105" y="100" width="50" height="50" rx="5" fill="white" stroke="#f59f00" opacity="0.8"/>
    <rect x="170" y="100" width="50" height="50" rx="5" fill="white" stroke="#f59f00" opacity="0.8"/>
    <text x="130" y="170" text-anchor="middle" font-size="9">Path 博弈 (Competition)</text>

    <!-- Physics-Informed CoT -->
    <rect x="20" y="200" width="220" height="220" rx="8" fill="#fcc419" opacity="0.05" stroke="#f59f00"/>
    <text x="110" y="225" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Physics-Informed CoT</text>
    <g font-family="Arial, sans-serif" font-size="10" fill="#495057">
      <text x="40" y="255">▶ Environmental Load Audit</text>
      <text x="40" y="285">▶ Structural Role Weighting</text>
      <text x="40" y="315">▶ Cross-modal Gap Analysis</text>
      <text x="40" y="345">▶ Uncertainty Quantization</text>
    </g>

    <!-- Decision Gate -->
    <path d="M40 440 L220 440" stroke="#fab005" stroke-width="2" stroke-dasharray="2,2"/>
    <text x="130" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e67e22">COGNITIVE CONSENSUS</text>
  </g>

  <!-- Stage IV Elements -->
  <g transform="translate(980, 250)">
    <rect width="160" height="110" rx="8" fill="white" stroke="#40c057"/>
    <text x="80" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Precision UAV</text>
    <text x="80" y="60" text-anchor="middle" font-size="10">Z-Scan Waypoints</text>
    <text x="80" y="85" text-anchor="middle" font-size="10" fill="#2f9e44">Solar Window Opt.</text>
  </g>
  <g transform="translate(980, 420)">
    <rect width="160" height="110" rx="8" fill="white" stroke="#40c057"/>
    <text x="80" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Expert Payload</text>
    <text x="80" y="60" text-anchor="middle" font-size="10">Anomaly JSON</text>
    <text x="80" y="85" text-anchor="middle" font-size="10" fill="#2f9e44">White-box Reasoning</text>
  </g>

  <!-- Flow Arrows -->
  <line x1="270" y1="450" x2="320" y2="450" stroke="#adb5bd" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <line x1="560" y1="450" x2="610" y2="450" stroke="#339af0" stroke-width="2.5" marker-end="url(#arrowhead)"/>
  <line x1="910" y1="450" x2="960" y2="450" stroke="#fab005" stroke-width="2.5" marker-end="url(#arrowhead)"/>

  <!-- Feedback Evolutionary Loop -->
  <path d="M 1060 800 C 1060 870, 160 870, 160 800" fill="none" stroke="#e03131" stroke-width="2.5" stroke-dasharray="8" marker-end="url(#arrowhead-red)"/>
  <text x="610" y="860" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e03131">REINFORCEMENT FEEDBACK: SELF-CALIBRATING MEMORY LOOP</text>

</svg>



